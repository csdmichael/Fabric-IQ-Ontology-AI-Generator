<ion-card>
  <ion-card-header>
    <ion-card-title>Ontology graph</ion-card-title>
  </ion-card-header>
  <ion-card-content>
    <div class="visual-shell">
      <svg viewBox="0 0 900 420" width="100%" height="320" aria-label="Ontology entity graph preview">
        <defs>
          <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
            <path d="M0,0 L8,4 L0,8 z" fill="#45658f"></path>
          </marker>
        </defs>

        @for (line of relationshipLines(); track line.id) {
          <line
            [attr.x1]="line.x1"
            [attr.y1]="line.y1"
            [attr.x2]="line.x2"
            [attr.y2]="line.y2"
            stroke="#45658f"
            stroke-width="2"
            marker-end="url(#arrow)"
          ></line>
          <text
            [attr.x]="line.labelX"
            [attr.y]="line.labelY"
            fill="#223856"
            font-size="12"
            text-anchor="middle"
          >
            {{ line.name }}
          </text>
        }

        @for (entity of ontology.entities; track entity.id; let index = $index) {
          <g
            class="graph-node"
            role="button"
            tabindex="0"
            (click)="selectEntity(entity.id)"
            [attr.transform]="'translate(' + (nodeX(index) - 70) + ',' + (nodeY(index) - 42) + ')'"
          >
            <rect
              width="140"
              height="84"
              rx="18"
              [attr.fill]="selectedEntityId === entity.id ? '#0f243f' : '#f0f7ff'"
              [attr.stroke]="selectedEntityId === entity.id ? '#87c4ff' : '#2f6ea9'"
              stroke-width="2"
            ></rect>
            <text x="12" y="30" [attr.fill]="selectedEntityId === entity.id ? '#e7f4ff' : '#102542'" font-size="15" font-weight="700">
              {{ entity.name }}
            </text>
            <text x="12" y="53" [attr.fill]="selectedEntityId === entity.id ? '#b9d8ff' : '#4f6480'" font-size="12">
              {{ entity.properties.length }} properties
            </text>
          </g>
        }
      </svg>
      @if (!ontology.entities.length) {
        <ion-text class="muted">Generate or add entities to preview relationships and business concepts.</ion-text>
      }
    </div>
  </ion-card-content>
</ion-card>

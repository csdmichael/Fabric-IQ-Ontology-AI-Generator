name: deploy-foundry-agents

# Runs ONLY when Foundry agent definitions change.
# Workflow-file edits alone will NOT trigger this — use workflow_dispatch.
on:
  push:
    branches: [main]
    paths:
      - 'foundry/**'
  pull_request:
    branches: [main]
    paths:
      - 'foundry/**'
  workflow_dispatch:
    inputs:
      agent:
        description: 'Specific agent to deploy (ontology-generator | ontology-data-binder | all)'
        required: true
        default: 'all'

permissions:
  id-token: write   # OIDC federated login to Azure
  contents: read

env:
  WORKING_DIR: foundry
  FOUNDRY_PROJECT_ENDPOINT: https://002-ai-poc-private.services.ai.azure.com/api/projects/proj-default

jobs:
  deploy-agents:
    name: deploy Foundry agents
    runs-on: ubuntu-latest
    environment: prod
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Foundry SDKs
        run: |
          python -m pip install --upgrade pip
          pip install azure-identity azure-ai-projects pyyaml

      - name: Deploy agents (creates or updates by name)
        env:
          FOUNDRY_PROJECT_ENDPOINT: ${{ secrets.FOUNDRY_PROJECT_ENDPOINT }}
          TARGET_AGENT: ${{ inputs.agent || 'all' }}
        run: python deploy.py

      - name: Publish agent IDs to Key Vault
        env:
          KEY_VAULT_NAME: ${{ secrets.KEY_VAULT_NAME }}
        run: |
          if [ -f agent-ids.json ]; then
            GEN_ID=$(jq -r '."ontology-generator"' agent-ids.json)
            BIND_ID=$(jq -r '."ontology-data-binder"' agent-ids.json)
            [ -n "$GEN_ID" ] && [ "$GEN_ID" != "null" ] && az keyvault secret set --vault-name "$KEY_VAULT_NAME" --name FOUNDRY-AGENT-ONTOLOGY-GENERATOR-ID --value "$GEN_ID" >/dev/null
            [ -n "$BIND_ID" ] && [ "$BIND_ID" != "null" ] && az keyvault secret set --vault-name "$KEY_VAULT_NAME" --name FOUNDRY-AGENT-ONTOLOGY-DATA-BINDER-ID --value "$BIND_ID" >/dev/null
            echo "Published agent IDs to $KEY_VAULT_NAME"
          fi

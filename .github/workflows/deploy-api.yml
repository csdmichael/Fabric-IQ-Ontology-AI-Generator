name: deploy-api

# Runs ONLY when API code changes.
# Doc/readme edits, UI changes, agent definitions, etc. will NOT trigger this workflow.
on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - '.github/workflows/deploy-api.yml'
  pull_request:
    branches: [main]
    paths:
      - 'api/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

permissions:
  id-token: write   # OIDC federated login to Azure
  contents: read

env:
  NODE_VERSION: '22.x'
  WORKING_DIR: api
  AZURE_RESOURCE_GROUP: ai-myaacoub
  AZURE_WEBAPP_NAME: api-fabriciq-b3

jobs:
  build:
    name: build + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: api/package-lock.json

      - run: npm ci
      - run: npm run lint --if-present
      - run: npm test --if-present
      - run: npm run build

      - name: Stage production bundle (POSIX paths)
        run: |
          set -e
          STAGE=../release/api-stage
          rm -rf "$STAGE" && mkdir -p "$STAGE"
          cp -r dist "$STAGE/"
          cp package.json package-lock.json "$STAGE/"
          (cd "$STAGE" && npm ci --omit=dev --no-audit --no-fund)
          echo "--- staged tree top level ---"
          ls -la "$STAGE"
          du -sh "$STAGE"

      - name: Zip release
        run: |
          set -e
          cd ../release/api-stage
          zip -rq ../api.zip . -x "*.map" -x "*.test.*" -x "*.spec.*"
          ls -lh ../api.zip

      - uses: actions/upload-artifact@v4
        with:
          name: api-package
          path: release/api.zip
          retention-days: 7
          if-no-files-found: error

  deploy:
    name: deploy to App Service
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: api-package
          path: ./release

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy zip to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: release/api.zip

      - name: Restart API
        run: az webapp restart -g ${{ env.AZURE_RESOURCE_GROUP }} -n ${{ env.AZURE_WEBAPP_NAME }}

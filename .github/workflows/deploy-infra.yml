name: deploy-infra

# Runs ONLY when Terraform infra files change.
# Doc/readme edits, app code, agent definitions, etc. will NOT trigger this workflow.
on:
  push:
    branches: [main]
    paths:
      - 'infra/terraform/**'
      - '.github/workflows/deploy-infra.yml'
  pull_request:
    branches: [main]
    paths:
      - 'infra/terraform/**'
      - '.github/workflows/deploy-infra.yml'
  workflow_dispatch:
    inputs:
      apply:
        description: 'Apply the Terraform plan (true/false)'
        required: true
        default: 'false'

permissions:
  id-token: write   # OIDC federated login to Azure
  contents: read
  pull-requests: write

env:
  TF_IN_AUTOMATION: 'true'
  TF_VERSION: '1.9.5'
  WORKING_DIR: infra/terraform

jobs:
  terraform:
    name: terraform plan / apply
    runs-on: ubuntu-latest
    environment: prod
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform init
        env:
          ARM_USE_OIDC: 'true'
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.TF_STATE_CONTAINER }}" \
            -backend-config="key=${{ secrets.TF_STATE_KEY }}"

      - name: terraform validate
        run: terraform validate

      - name: terraform plan
        env:
          ARM_USE_OIDC: 'true'
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_entra_client_id: ${{ secrets.ENTRA_CLIENT_ID }}
        run: |
          terraform plan \
            -var-file="dev.tfvars" \
            -input=false \
            -out=tfplan

      - name: terraform apply
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.apply == 'true')
        env:
          ARM_USE_OIDC: 'true'
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: terraform apply -input=false -auto-approve tfplan
